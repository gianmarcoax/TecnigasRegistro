<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Selector de Productos – Catálogo Tecnigass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
  <style>
    /* ══ RESET ══════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --blue: #2563eb;
      --blue-d: #1d4ed8;
      --blue-l: #eff6ff;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .06);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, .1);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, .12);
      --r: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* ══ HEADER ══════════════════════════════════════════════ */
    header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #3b82f6 100%);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(37, 99, 235, .35);
      flex-shrink: 0;
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .hdr-logo {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, .2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px
    }

    .hdr-title {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700
    }

    .hdr-sub {
      color: rgba(255, 255, 255, .7);
      font-size: .78rem
    }

    .hdr-badge {
      background: rgba(255, 255, 255, .15);
      border: 1px solid rgba(255, 255, 255, .3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 600;
    }

    .hdr-badge span {
      font-size: 1rem;
      font-weight: 800
    }

    /* ══ MAIN LAYOUT ══════════════════════════════════════════ */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ══ LEFT PANEL – SEARCH ══════════════════════════════════ */
    .panel-search {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--gray-200);
    }

    .search-bar {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .inp-wrap {
      position: relative;
      flex: 1 1 200px
    }

    .inp-wrap .ico {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none
    }

    input[type=text] {
      width: 100%;
      padding: 10px 10px 10px 36px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: .92rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }

    input[type=text]:focus {
      border-color: var(--blue)
    }

    select {
      padding: 10px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: .88rem;
      font-family: inherit;
      background: #fff;
      outline: none;
      cursor: pointer;
      min-width: 180px;
      transition: border-color .2s;
    }

    select:focus {
      border-color: var(--blue)
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap
    }

    .btn:active {
      transform: scale(.97)
    }

    .btn-primary {
      background: var(--blue);
      color: #fff
    }

    .btn-primary:hover {
      background: var(--blue-d)
    }

    .btn-ghost {
      background: var(--gray-100);
      color: var(--gray-600)
    }

    .btn-ghost:hover {
      background: var(--gray-200)
    }

    .results-meta {
      font-size: .8rem;
      color: var(--gray-400);
      padding: 0 2px
    }

    /* ══ PRODUCT GRID ══════════════════════════════════════════ */
    .grid-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px
    }

    .prod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 14px
    }

    .prod-card {
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: transform .18s, box-shadow .18s;
      border: 2px solid transparent;
    }

    .prod-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md)
    }

    .prod-card.selected {
      border-color: var(--green)
    }

    .prod-img {
      height: 130px;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .prod-img img {
      max-height: 115px;
      max-width: 90%;
      object-fit: contain
    }

    .prod-img .ph {
      font-size: 44px;
      opacity: .35
    }

    .selected-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #16a34a;
      color: #fff;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 8px;
      display: none;
    }

    .prod-card.selected .selected-badge {
      display: block
    }

    .prod-body {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .prod-code {
      font-size: .7rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: .05em;
      text-transform: uppercase
    }

    .prod-name {
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray-800);
      line-height: 1.35;
      flex: 1
    }

    .prod-categ {
      font-size: .7rem;
      color: var(--gray-400);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .prod-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-top: 1px solid var(--gray-100)
    }

    .prod-price {
      font-size: .88rem;
      font-weight: 700
    }

    .btn-add {
      font-size: .72rem;
      font-weight: 700;
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    .btn-add:active {
      transform: scale(.95)
    }

    .btn-add.add {
      background: #dbeafe;
      color: var(--blue)
    }

    .btn-add.add:hover {
      background: #bfdbfe
    }

    .btn-add.added {
      background: #dcfce7;
      color: var(--green);
      cursor: pointer
    }

    .btn-add.added:hover {
      background: #bbf7d0
    }

    /* ══ STATE MESSAGES ══════════════════════════════════════════ */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400)
    }

    .state-msg .ico {
      font-size: 44px;
      display: block;
      margin-bottom: 10px
    }

    .spinner-wrap {
      text-align: center;
      padding: 60px
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      margin: 0 auto 10px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ══ RIGHT PANEL – SELECTION CART ══════════════════════════ */
    .panel-cart {
      width: 310px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .cart-header {
      padding: 16px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .cart-title {
      font-size: .95rem;
      font-weight: 700
    }

    .cart-count {
      background: var(--blue-l);
      color: var(--blue);
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      padding: 2px 10px
    }

    .cart-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px
    }

    .cart-empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--gray-400);
      font-size: .85rem
    }

    .cart-empty .ico {
      font-size: 36px;
      display: block;
      margin-bottom: 8px
    }

    .categ-group {
      margin-bottom: 14px
    }

    .categ-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--gray-400);
      padding: 4px 6px;
      margin-bottom: 4px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      background: var(--gray-50);
      margin-bottom: 4px;
    }

    .cart-item-info {
      flex: 1;
      min-width: 0
    }

    .cart-item-name {
      font-size: .78rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .cart-item-code {
      font-size: .68rem;
      color: var(--gray-400)
    }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-300);
      font-size: 16px;
      line-height: 1;
      padding: 2px;
      transition: color .15s
    }

    .btn-remove:hover {
      color: var(--red)
    }

    /* ══ CART FOOTER ══════════════════════════════════════════ */
    .cart-footer {
      padding: 14px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0
    }

    .btn-catalog {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 14px rgba(37, 99, 235, .35);
    }

    .btn-catalog:hover {
      opacity: .92
    }

    .btn-catalog:active {
      transform: scale(.98)
    }

    .btn-catalog:disabled {
      opacity: .4;
      cursor: default
    }

    .btn-clear-all {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--gray-100);
      color: var(--gray-600);
      transition: background .15s;
    }

    .btn-clear-all:hover {
      background: var(--gray-200)
    }

    /* ══ SCROLLBAR ══════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gray-300);
      border-radius: 3px
    }

    /* ══ RESPONSIVE ══════════════════════════════════════════════ */
    @media(max-width:750px) {
      .app {
        flex-direction: column
      }

      .panel-cart {
        width: 100%;
        height: 260px;
        border-top: 1px solid var(--gray-200);
        border-right: none
      }

      .panel-search {
        border-right: none
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="hdr-left">
      <div class="hdr-logo">🔥</div>
      <div>
        <div class="hdr-title">Tecnigass – Selector de Catálogo</div>
        <div class="hdr-sub">Busca y agrega productos para generar tu catálogo</div>
      </div>
    </div>
    <div class="hdr-badge">Seleccionados: <span id="totalCount">0</span></div>
  </header>

  <div class="app">

    <!-- ── LEFT: SEARCH PANEL ── -->
    <section class="panel-search">
      <div class="search-bar">
        <div class="search-row">
          <div class="inp-wrap">
            <span class="ico">🔍</span>
            <input id="searchInput" type="text" placeholder="Nombre o código de producto…" autocomplete="off" />
          </div>
          <select id="categSelect">
            <option value="">📂 Todas las categorías</option>
          </select>
          <button class="btn btn-primary" id="btnSearch">Buscar</button>
          <button class="btn btn-ghost" id="btnClear" title="Limpiar">✕</button>
        </div>
        <div class="results-meta" id="resultsMeta"></div>
      </div>
      <div class="grid-area">
        <div id="resultsArea">
          <div class="state-msg">
            <span class="ico">📦</span>
            <p>Busca productos para comenzar a armar tu catálogo</p>
          </div>
        </div>
      </div>
    </section>

    <!-- ── RIGHT: CART PANEL ── -->
    <aside class="panel-cart">
      <div class="cart-header">
        <span class="cart-title">📋 Lista del catálogo</span>
        <span class="cart-count" id="cartCount">0 productos</span>
      </div>

      <div class="cart-list" id="cartList">
        <div class="cart-empty">
          <span class="ico">🛒</span>
          Agrega productos desde el buscador
        </div>
      </div>

      <div class="cart-footer">
        <button class="btn-catalog" id="btnGenerate" disabled>
          📄 Generar Catálogo
        </button>
        <button class="btn-clear-all" id="btnClearAll">Limpiar selección</button>
      </div>
    </aside>

  </div><!-- /app -->

  <script>
    const API = '/api';

    // ── State ──────────────────────────────────────────────────
    // Map<id, {id, name, default_code, categ_id, list_price, qty_available, image_128}>
    let selected = new Map();

    // Load persisted selection
    try {
      const saved = JSON.parse(localStorage.getItem('catalog_selection') || '[]');
      saved.forEach(p => selected.set(p.id, p));
    } catch (e) { selected = new Map(); }

    // ── Categories ─────────────────────────────────────────────
    async function loadCategories() {
      try {
        const r = await fetch(`${API}?action=categories`);
        const d = await r.json();
        const sel = document.getElementById('categSelect');
        (d.categories || []).forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.complete_name;
          sel.appendChild(opt);
        });
      } catch (e) { console.error(e); }
    }

    // ── Search ─────────────────────────────────────────────────
    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      const categ = document.getElementById('categSelect').value;
      const meta = document.getElementById('resultsMeta');

      if (!q && !categ) { showState(); return; }

      showSpinner();
      meta.textContent = 'Buscando…';
      try {
        const r = await fetch(`${API}?action=search&q=${encodeURIComponent(q)}&categ=${categ}`);
        const d = await r.json();
        if (d.error) { showError(d.error); meta.textContent = ''; return; }
        const prods = d.products || [];
        meta.textContent = prods.length > 0 ? `${prods.length} producto(s) encontrado(s)` : '';
        renderGrid(prods);
      } catch (e) {
        showError('No se pudo conectar con el servidor.');
        meta.textContent = '';
      }
    }

    // ── Grid render ────────────────────────────────────────────
    function renderGrid(products) {
      const area = document.getElementById('resultsArea');
      if (products.length === 0) {
        area.innerHTML = `<div class="state-msg"><span class="ico">🔎</span><p>Sin resultados para esa búsqueda</p></div>`;
        return;
      }
      area.innerHTML = `<div class="prod-grid">${products.map(cardHTML).join('')}</div>`;
    }

    function cardHTML(p) {
      const isSelected = selected.has(p.id);
      const code = p.default_code || '—';
      const categ = Array.isArray(p.categ_id) ? p.categ_id[1] : '—';
      const price = `S/ ${parseFloat(p.list_price || 0).toFixed(2)}`;
      const imgHTML = p.image_128
        ? `<img src="data:image/png;base64,${p.image_128}" alt="${p.name}" loading="lazy"/>`
        : `<span class="ph">📦</span>`;
      const btnClass = isSelected ? 'added' : 'add';
      const btnLabel = isSelected ? '✓ Agregado' : '＋ Agregar';

      return `
  <div class="prod-card${isSelected ? ' selected' : ''}" id="card-${p.id}">
    <div class="selected-badge">✓</div>
    <div class="prod-img">${imgHTML}</div>
    <div class="prod-body">
      <div class="prod-code">📌 ${code}</div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-categ">📂 ${categ}</div>
    </div>
    <div class="prod-footer">
      <div class="prod-price">${price}</div>
      <button class="btn-add ${btnClass}" onclick="toggleProduct(${p.id}, this)" data-prod='${JSON.stringify(p).replace(/'/g, "&#39;")}'>${btnLabel}</button>
    </div>
  </div>`;
    }

    // ── Toggle product selection ───────────────────────────────
    function toggleProduct(id, btn) {
      const p = JSON.parse(btn.dataset.prod);
      if (selected.has(id)) {
        selected.delete(id);
        btn.className = 'btn-add add';
        btn.textContent = '＋ Agregar';
        document.getElementById(`card-${id}`)?.classList.remove('selected');
      } else {
        selected.set(id, p);
        btn.className = 'btn-add added';
        btn.textContent = '✓ Agregado';
        document.getElementById(`card-${id}`)?.classList.add('selected');
      }
      saveAndRenderCart();
    }

    // ── Cart render ────────────────────────────────────────────
    function saveAndRenderCart() {
      const items = [...selected.values()];
      localStorage.setItem('catalog_selection', JSON.stringify(items));

      const count = items.length;
      document.getElementById('totalCount').textContent = count;
      document.getElementById('cartCount').textContent = `${count} producto${count !== 1 ? 's' : ''}`;
      document.getElementById('btnGenerate').disabled = count === 0;

      const list = document.getElementById('cartList');
      if (count === 0) {
        list.innerHTML = `<div class="cart-empty"><span class="ico">🛒</span>Agrega productos desde el buscador</div>`;
        return;
      }

      // Group by category
      const groups = {};
      items.forEach(p => {
        const cat = Array.isArray(p.categ_id) ? p.categ_id[1] : 'Sin categoría';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(p);
      });

      list.innerHTML = Object.entries(groups).sort(([a], [b]) => a.localeCompare(b)).map(([cat, ps]) => `
    <div class="categ-group">
      <div class="categ-label">📂 ${cat}</div>
      ${ps.map(p => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name" title="${p.name}">${p.name}</div>
            <div class="cart-item-code">${p.default_code || '—'}</div>
          </div>
          <button class="btn-remove" onclick="removeItem(${p.id})" title="Quitar">✕</button>
        </div>`).join('')}
    </div>`).join('');
    }

    function removeItem(id) {
      selected.delete(id);
      // Update card state in grid if visible
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.classList.remove('selected');
        const btn = card.querySelector('.btn-add');
        if (btn) { btn.className = 'btn-add add'; btn.textContent = '＋ Agregar'; }
      }
      saveAndRenderCart();
    }

    // ── Generate catalog ───────────────────────────────────────
    document.getElementById('btnGenerate').addEventListener('click', () => {
      window.open('catalog.html', '_blank');
    });

    document.getElementById('btnClearAll').addEventListener('click', () => {
      if (!confirm('¿Limpiar toda la selección?')) return;
      selected.clear();
      // Reset visible cards
      document.querySelectorAll('.prod-card.selected').forEach(c => {
        c.classList.remove('selected');
        const b = c.querySelector('.btn-add');
        if (b) { b.className = 'btn-add add'; b.textContent = '＋ Agregar'; }
      });
      saveAndRenderCart();
    });

    // ── Event listeners ────────────────────────────────────────
    document.getElementById('btnSearch').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('categSelect').value = '';
      document.getElementById('resultsMeta').textContent = '';
      showState();
    });

    // ── UI helpers ──────────────────────────────────────────────
    function showSpinner() {
      document.getElementById('resultsArea').innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--gray-400);font-size:.85rem">Cargando desde Odoo…</p></div>`;
    }
    function showState() {
      document.getElementById('resultsArea').innerHTML = `<div class="state-msg"><span class="ico">📦</span><p>Busca productos para comenzar a armar tu catálogo</p></div>`;
    }
    function showError(msg) {
      document.getElementById('resultsArea').innerHTML = `<div class="state-msg"><span class="ico">⚠️</span><p style="color:var(--red)">${msg}</p></div>`;
    }

    // ── Init ────────────────────────────────────────────────────
    loadCategories();
    saveAndRenderCart(); // render persisted selection
  </script>
